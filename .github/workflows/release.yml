name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build pocket CLI
        run: cargo build --release
      - name: Archive CLI
        run: |
          mkdir -p dist
          cp target/release/pocket dist/pocket-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: pocket-cli
          path: dist/*

  build-macos:
    runs-on: macos-latest
    needs: build-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install tauri-cli
        run: cargo install tauri-cli --locked
      - name: Build Tauri bundle
        working-directory: gui
        run: cargo tauri build --verbose
      - name: Notarize and staple if creds exist
        if: env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          DMG=$(ls gui/src-tauri/target/release/bundle/macos/*.dmg | head -n1)
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: pocket-macos
          path: gui/src-tauri/target/release/bundle/macos/*

  release:
    needs: [build-cli, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
