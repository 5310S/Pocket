<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pocket Wallet</title>
  <style>
    :root { --bg:#050915; --panel:#0f1a33; --accent:#4de1ff; --text:#e9eef7; --muted:#a9b7d4; }
    body { margin:0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:18px 20px; background:linear-gradient(135deg,#0b1227,#0d1c3a); border-bottom:1px solid rgba(255,255,255,0.08); }
    h1 { margin:0; font-size:22px; }
    main { max-width:640px; margin:30px auto 60px; padding:0 20px; display:grid; gap:16px; }
    section { background:var(--panel); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px 18px; box-shadow:0 12px 32px rgba(0,0,0,0.35); }
    label { display:block; font-size:13px; color:var(--muted); margin-bottom:4px; }
    input { width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:#0b1327; color:var(--text); }
    button { margin-top:10px; padding:10px 14px; border:none; border-radius:10px; background:var(--accent); color:#04101f; font-weight:700; cursor:pointer; }
    pre { background:#0a142a; padding:10px; border-radius:8px; overflow:auto; color:#dfe7f7; }
    .row { display:flex; gap:10px; align-items:center; }
    .status { font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Pocket Wallet (macOS demo)</h1>
    <div class="status" id="status">Ready</div>
  </header>
  <main>
    <section>
      <label for="password">Keystore password</label>
      <input id="password" type="password" placeholder="Enter password">
      <div class="row">
        <button id="init">Init keystore</button>
        <button id="show">Show address</button>
        <button id="balance">Get balance</button>
      </div>
    </section>
    <section>
      <h3>Chain status</h3>
      <div class="row">
        <button id="head">Head</button>
        <button id="diff">Difficulty</button>
      </div>
    </section>
    <section>
      <h3>Config & Payout</h3>
      <div class="row" style="flex-wrap:wrap; gap:8px;">
        <input id="rpc" placeholder="RPC (default https://127.0.0.1:8645)" style="flex:1; min-width:240px;">
        <input id="token" placeholder="Bearer token (optional)" style="flex:1; min-width:200px;">
      </div>
      <div class="row" style="flex-wrap:wrap; gap:8px; margin-top:8px;">
        <input id="payout" placeholder="Payout address (pc/tpc)" style="flex:1; min-width:240px;">
        <input id="att" placeholder="Attestation token (optional)" style="flex:1; min-width:200px;">
      </div>
      <div class="row">
        <button id="save-config">Save Config</button>
        <button id="show-config">Show Config</button>
        <button id="save-profile">Save Profile</button>
        <button id="show-profile">Show Profile</button>
      </div>
    </section>
    <section>
      <h3>Output</h3>
      <pre id="output">(nothing yet)</pre>
    </section>
  </main>
  <script>
    const { invoke } = window.__TAURI__.tauri;
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    function setStatus(msg) { status.textContent = msg; }
    function setOutput(obj) { output.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj,null,2); }

    async function call(cmd, args) {
      try {
        setStatus('Running ' + cmd + '...');
        const res = await invoke(cmd, args);
        setOutput(res);
        setStatus('OK');
      } catch (e) {
        setStatus('Error');
        setOutput(String(e));
      }
    }

    document.getElementById('init').onclick = () => {
      const password = document.getElementById('password').value;
      call('cmd_init', { password, hrp: 'tpc' });
    };
    document.getElementById('show').onclick = () => {
      const password = document.getElementById('password').value;
      call('cmd_show', { password });
    };
    document.getElementById('balance').onclick = () => {
      const password = document.getElementById('password').value;
      call('cmd_balance', { password, rpc: 'https://127.0.0.1:8645', token: null });
    };
    document.getElementById('head').onclick = () => {
      call('cmd_head', { rpc: 'https://127.0.0.1:8645', token: null });
    };
    document.getElementById('diff').onclick = () => {
      call('cmd_difficulty', { rpc: 'https://127.0.0.1:8645', token: null });
    };
    document.getElementById('save-config').onclick = () => {
      const rpc = document.getElementById('rpc').value || null;
      const token = document.getElementById('token').value || null;
      call('cmd_set_config', { rpc, token });
    };
    document.getElementById('show-config').onclick = () => {
      call('cmd_show_config', {});
    };
    document.getElementById('save-profile').onclick = () => {
      const address = document.getElementById('payout').value;
      const attestation = document.getElementById('att').value || null;
      call('cmd_set_profile', { address, attestation });
    };
    document.getElementById('show-profile').onclick = () => {
      call('cmd_show_profile', {});
    };
  </script>
</body>
</html>
